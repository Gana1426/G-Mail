version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://mailhost:mailhost_secret@postgres:5432/mailhost?schema=public
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mailhost-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mailhost
      POSTGRES_PASSWORD: mailhost_secret
      POSTGRES_DB: mailhost
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailhost -d mailhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mailhost-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mailhost-network
    restart: unless-stopped

  postfix:
    image: boky/postfix:latest
    environment:
      ALLOWED_SENDER_DOMAINS: example.com
      HOSTNAME: mail.example.com
      RELAYHOST: ""
    ports:
      - "25:25"
      - "587:587"
    volumes:
      - postfix_spool:/var/spool/postfix
      - ./docker/postfix/main.cf:/etc/postfix/main.cf:ro
    depends_on:
      - postgres
    networks:
      - mailhost-network
    restart: unless-stopped

  dovecot:
    image: tvial/docker-mailserver:latest
    hostname: mail.example.com
    ports:
      - "143:143"
      - "993:993"
      - "110:110"
      - "995:995"
    volumes:
      - mail_data:/var/mail
      - ./docker/dovecot:/etc/dovecot:ro
    depends_on:
      - postfix
    networks:
      - mailhost-network
    restart: unless-stopped

  rspamd:
    image: rspamd/rspamd:latest
    ports:
      - "11332:11332"
      - "11334:11334"
    volumes:
      - rspamd_data:/var/lib/rspamd
      - ./docker/rspamd/local.d:/etc/rspamd/local.d:ro
    networks:
      - mailhost-network
    restart: unless-stopped

  clamav:
    image: clamav/clamav:latest
    volumes:
      - clamav_data:/var/lib/clamav
    networks:
      - mailhost-network
    restart: unless-stopped

  roundcube:
    image: roundcube/roundcubemail:latest
    ports:
      - "8080:80"
    environment:
      ROUNDCUBEMAIL_DB_TYPE: pgsql
      ROUNDCUBEMAIL_DB_HOST: postgres
      ROUNDCUBEMAIL_DB_NAME: mailhost
      ROUNDCUBEMAIL_DB_USER: mailhost
      ROUNDCUBEMAIL_DB_PASSWORD: mailhost_secret
      ROUNDCUBEMAIL_DEFAULT_HOST: dovecot
      ROUNDCUBEMAIL_DEFAULT_PORT: 143
      ROUNDCUBEMAIL_SMTP_SERVER: postfix
      ROUNDCUBEMAIL_SMTP_PORT: 587
    depends_on:
      - postgres
      - dovecot
      - postfix
    networks:
      - mailhost-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  postfix_spool:
  mail_data:
  rspamd_data:
  clamav_data:

networks:
  mailhost-network:
    driver: bridge
